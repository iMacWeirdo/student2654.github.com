<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom - General Mathematics</title> <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #00ff00;
            font-family: monospace; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%;
            z-index: 10; pointer-events: none; padding: 20px;
        }
        canvas {
            position: fixed; top: 0; left: 0;
            image-rendering: pixelated;
        }
        #blocker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; display: flex;
            justify-content: center; align-items: center; color: white;
            font-size: 1.2rem; display: none;
        }
    </style>
</head>
<body>

    <div id="blocker"><h1>ENVIRONMENT RESTRICTED</h1></div>

    <div id="ui-layer">
        <div style="background: rgba(255,0,0,0.2); padding: 10px; border: 1px solid red;">
            STATUS: SECURE_VIEW // OSCILLATION_ACTIVE
        </div>
    </div>

    <canvas id="secureCanvas"></canvas>

    <script>
        const canvas = document.getElementById('secureCanvas');
        const ctx = canvas.getContext('2d');
        const blocker = document.getElementById('blocker');
        let originalTitle = "Research Document Alpha";
        let cloakTitle = "Classroom - General Mathematics";

        // Configuration
        const textToDisplay = [
            "PROJECT LOREM IPSUM - CLASSIFIED",
            "--------------------------------",
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
            "Sed do eiusmod tempor incididunt ut labore et dolore.",
            "This text is rendered via GPU buffer to bypass standard",
            "DOM-based screen scrapers and content filters.",
            "",
            "VECTOR 1: High-Frequency Temporal Noise",
            "VECTOR 2: Sub-pixel Text Jittering",
            "VECTOR 3: Visibility Polling (10ms)"
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function render() {
            // 1. Clear with slight alpha to create motion blur on recorders
            ctx.fillStyle = "rgba(10, 10, 10, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Generate disruption noise
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const data = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < data.length; i++) {
                if (Math.random() > 0.98) {
                    data[i] = 0xff00ff00; // Bright green interference pixels
                }
            }
            ctx.putImageData(idata, 0, 0);

            // 3. Render Jittery Text (Breaks many OCR systems)
            ctx.font = "18px monospace";
            ctx.fillStyle = "#00ff00";
            
            const jitterX = Math.random() * 1.5;
            const jitterY = Math.random() * 1.5;

            textToDisplay.forEach((line, index) => {
                ctx.fillText(line, 50 + jitterX, 100 + (index * 30) + jitterY);
            });

            requestAnimationFrame(render);
        }

        // Aggressive State Polling
        setInterval(() => {
            const isActive = document.hasFocus() && document.visibilityState === 'visible';
            
            if (!isActive) {
                // Kill the view immediately
                canvas.style.display = 'none';
                blocker.style.display = 'flex';
                document.title = cloakTitle;
            } else {
                canvas.style.display = 'block';
                blocker.style.display = 'none';
                document.title = originalTitle;
            }
        }, 10);

        // Block Key Commands (PrintScreen, Inspect)
        window.addEventListener('keydown', (e) => {
            if (e.key === "PrintScreen" || (e.ctrlKey && e.shiftKey && e.key === "I") || (e.metaKey && e.altKey && e.key === "i")) {
                e.preventDefault();
                canvas.remove(); // Self-destruct content
                alert("Security Violation");
            }
        });

        // Prevent Right Click
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Start Rendering
        render();
    </script>
</body>
</html>
