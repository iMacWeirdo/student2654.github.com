<!DOCTYPE html>
<html>
<head>
    <title>LCD2USB Ultimate Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; padding: 40px; }
        .panel { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; width: 400px; }
        h2 { color: #00ffcc; margin-top: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        input { background: #111; border: 1px solid #00ffcc; color: #00ffcc; padding: 12px; width: calc(100% - 26px); margin-bottom: 15px; font-family: monospace; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-connect { background: #00ffcc; color: #1a1a1a; }
        .btn-send { background: #28a745; color: white; }
        .btn-clear { background: #dc3545; color: white; }
        #status { font-size: 0.85rem; color: #888; margin-top: 15px; padding: 10px; background: #111; border-radius: 4px; border-left: 3px solid #00ffcc; }
    </style>
</head>
<body>

<div class="panel">
    <h2>LCD2USB Controller</h2>
    
    <button class="btn-connect" id="connectBtn">1. CONNECT & INITIALIZE</button>
    
    <div id="controls" style="display:none; margin-top: 20px;">
        <input type="text" id="line1" placeholder="Line 1" maxlength="16">
        <input type="text" id="line2" placeholder="Line 2" maxlength="16">
        <button class="btn-send" id="sendBtn">2. PRINT TEXT</button>
        <button class="btn-clear" id="clearBtn">CLEAR SCREEN</button>
    </div>

    <div id="status">Status: Waiting for USB connection...</div>
</div>

<script>
    let device;
    const VID = 0x0403;
    const PID = 0xc630;

    // LCD2USB Constants
    const LCD_CMD  = 0;
    const LCD_DATA = 1;
    const LCD_SET_BRIGHTNESS = 2;

    const statusDiv = document.getElementById('status');
    const controls = document.getElementById('controls');

    function updateStatus(msg) {
        statusDiv.innerText = `Status: ${msg}`;
        console.log(msg);
    }

    async function sendLcd(type, value) {
        await device.controlTransferOut({
            requestType: 'vendor',
            recipient: 'device',
            request: type,
            value: value,
            index: 0
        });
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ filters: [{ vendorId: VID, productId: PID }] });
            await device.open();
            await device.selectConfiguration(1);
            await device.claimInterface(0);

            updateStatus("Connected! Initializing screen...");

            // 1. Force Backlight On
            await sendLcd(LCD_SET_BRIGHTNESS, 255);

            // 2. Standard HD44780 Init Sequence
            // We send these as commands (LCD_CMD)
            await sendLcd(LCD_CMD, 0x33); // Wake up
            await new Promise(r => setTimeout(r, 5));
            await sendLcd(LCD_CMD, 0x32); // Set 4-bit mode
            await sendLcd(LCD_CMD, 0x28); // 2 lines, 5x7 font
            await sendLcd(LCD_CMD, 0x0C); // Display ON, No cursor
            await sendLcd(LCD_CMD, 0x06); // Entry mode
            await sendLcd(LCD_CMD, 0x01); // Clear display
            await new Promise(r => setTimeout(r, 5));

            controls.style.display = "block";
            document.getElementById('connectBtn').style.display = "none";
            updateStatus("LCD Ready. If blank, adjust the contrast screw!");

        } catch (err) {
            updateStatus(`Error: ${err.message}`);
        }
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
        try {
            const l1 = document.getElementById('line1').value.padEnd(16, ' ');
            const l2 = document.getElementById('line2').value.padEnd(16, ' ');

            // Jump to Home
            await sendLcd(LCD_CMD, 0x80);
            for (let char of l1) { await sendLcd(LCD_DATA, char.charCodeAt(0)); }

            // Jump to Line 2
            await sendLcd(LCD_CMD, 0xC0);
            for (let char of l2) { await sendLcd(LCD_DATA, char.charCodeAt(0)); }

            updateStatus("Data sent successfully.");
        } catch (err) {
            updateStatus(`Send Error: ${err.message}`);
        }
    });

    document.getElementById('clearBtn').addEventListener('click', async () => {
        await sendLcd(LCD_CMD, 0x01);
        updateStatus("Screen cleared.");
    });
</script>
</body>
</html>
