<!DOCTYPE html>
<html>
<head>
    <title>LCD2USB Pro Controller</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #222; color: #00ff00; padding: 20px; }
        .lcd-box { border: 4px solid #444; background: #003300; padding: 20px; width: 350px; border-radius: 10px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 90%; margin-bottom: 10px; }
        button { padding: 10px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        #status { margin-top: 15px; font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>

<div class="lcd-box">
    <h3>LCD2USB CONTROL</h3>
    <input type="text" id="line1" placeholder="Line 1 (16 chars)" maxlength="16"><br>
    <input type="text" id="line2" placeholder="Line 2 (16 chars)" maxlength="16"><br>
    <button onclick="updateLcd()">SEND TO LCD</button>
    <button onclick="initLcd()" style="background:#444; color:white;">RESET/ON</button>
    <div id="status">Status: Waiting for interaction...</div>
</div>

<script>
    let device;

    // LCD2USB Firmware Constants
    const LCD_CMD  = 0;
    const LCD_DATA = 1;
    const LCD_SET_BACKLIGHT = 2; // Some firmwares use this for brightness

    async function initLcd() {
        try {
            if (!device) {
                device = await navigator.usb.requestDevice({ 
                    filters: [{ vendorId: 0x0403, productId: 0xc630 }] 
                });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
            }

            document.getElementById('status').innerText = "Status: Connected. Initializing...";

            // 1. Set Backlight to MAX (Value 255)
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: LCD_SET_BACKLIGHT, value: 255, index: 0
            });

            // 2. Clear Display (Command 0x01)
            await sendCommand(0x01);
            
            document.getElementById('status').innerText = "Status: LCD Ready!";
        } catch (err) {
            document.getElementById('status').innerText = "Error: " + err;
        }
    }

    async function sendCommand(val) {
        await device.controlTransferOut({
            requestType: 'vendor', recipient: 'device',
            request: LCD_CMD, value: val, index: 0
        });
    }

    async function sendData(val) {
        await device.controlTransferOut({
            requestType: 'vendor', recipient: 'device',
            request: LCD_DATA, value: val, index: 0
        });
    }

    async function updateLcd() {
        if (!device) return alert("Click RESET/ON first!");
        
        const l1 = document.getElementById('line1').value.padEnd(16, ' ');
        const l2 = document.getElementById('line2').value.padEnd(16, ' ');

        // Clear Screen
        await sendCommand(0x01);
        
        // Write Line 1
        for (let char of l1) { await sendData(char.charCodeAt(0)); }

        // Jump to Line 2 (Set DDRAM Address to 0x40 -> Command 0x80 | 0x40 = 0xC0)
        await sendCommand(0xC0);

        // Write Line 2
        for (let char of l2) { await sendData(char.charCodeAt(0)); }
        
        document.getElementById('status').innerText = "Status: Data Sent.";
    }
</script>
</body>
</html>
